name: Build and push Docker image

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'      # bare semver tags: 1.4.0, 1.3.9, ...
  workflow_dispatch: {}             # manual run (for testing)

env:
  IMAGE_NAME: nigyta/dfast_core

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=test,enable=${{ github.event_name == 'workflow_dispatch' }}
          # On semver tag push: :<version> and :latest (flavor latest=auto, non-prerelease only)
          # On manual run (workflow_dispatch): :test only (does not affect release tags or :latest)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: nigyta
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
